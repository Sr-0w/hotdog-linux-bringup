name: Public tree quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate public tree
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes shellcheck

      - name: Run public-tree validation
        run: scripts/validate-public-tree.sh
